name: SRE Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sre-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install fastapi uvicorn pydantic pyyaml pytest; fi

      - name: Start FastAPI service
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Run daily SRE validation check
        shell: pwsh
        run: ./scripts/daily-sre-check.ps1